- name: create frontend
  hosts: frontend
  become: true
  tasks:  
  - name: Enable NGINX 1.24 DNF module stream
    ansible.builtin.dnf:
      name: "@nginx:1.24"
      state: present
  - name: install nginx
    package:  
      name: nginx
      state: present
  - name: remove default web
    file:
      path: /usr/share/nginx/html/
      state: absent
  - name: create html directory
    file:
      path: /usr/share/nginx/html/
      state: directory
  - name: download code
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/frontend-v3.zip
      dest: /tmp/frontend.zip
  - name: unarchive the file
    unarchive:
      src: /tmp/frontend.zip
      dest: /usr/share/nginx/html 
      remote_src: yes
  - name: remove file
    file: 
      path: /etc/nginx/nginx.conf
      state: absent
  - name: copy the file
    template:
      src: nginx.conf.j2
      dest: /etc/nginx/nginx.conf
  - name: restart nginx
    service:
      name: nginx
      state: started
      enabled: yes
