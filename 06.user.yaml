- name: user configuraction
  hosts: user
  become: true
  tasks:
  - name: Enable the Node.js 20 DNF module stream
    ansible.builtin.dnf:
      name: "@nodejs:20"
      state: present
  - name: install nodejs
    package:
      name: nodejs
      state: present
  - name: add system user
    user:
      name: roboshop
      comment: "Service account for custom application"
      system: true
      shell: /sbin/nologin
      home: /app
      state: present
  - name: remove the directory
    file:
      path: /app
      state: absent
  - name: remove code
    file:
      path: /tmp/user.zip
      state: absent
  - name: create directory
    file:
      path: /app
      state: directory
  - name: get the code
    get_url:
      url: "https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip"
      dest: /tmp/user.zip
  - name: unzip the code
    unarchive:
      src:  /tmp/user.zip
      dest: /app 
      remote_src: yes
  - name: install dependencies
    community.general.npm:
      path: /app 
  - name: copy the servic file
    template:
      src: catalogue.service.j2
      dest: /etc/systemd/system/user.service
  - name: daemon_reload
    systemd_service:
      name: user
      daemon_reload: yes
  - name: stare and enable
    service:
      name: user
      state: started
      enabled: true

    