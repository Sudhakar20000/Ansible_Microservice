- name: configuring redis server
  hosts: redis
  become: yes
  tasks:
  - name: enable redis 7
    command: dnf module enable redis:7 -y
  - name: install redis
    package:
      name: redis
      state: present
  - name: allow access
    replace:
      path: /etc/redis/redis.conf
      regexp: '^bind 127.0.0.1 -::1'
      replace: 'bind 0.0.0.0'
  - name: change protected mode
    lineinfile:
      path: /etc/redis/redis.conf
      regexp: 'protected-mode'
      line: 'protected-mode no'
  - name: start and enable redis
    service:
      name: redis 
      state: started
      enabled: yes